services:
  # Backend Laravel API
  - type: web
    name: ccs-profiling-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: CCS_Profiling_System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        fromService:
          name: ccs-profiling-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_CONNECTION
        value: mongodb
      - key: MONGODB_URI
        sync: false
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEED
        value: "true"
      - key: MONGO_TLS_ALLOW_INVALID_CERTS
        value: "true"
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: LOG_CHANNEL
        value: stderr
    healthCheckPath: /api/user
