services:
  # Backend Laravel API
  - type: web
    name: ccs-profiling-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: CCS_Profiling_System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://project-itew-2onj.onrender.com
      - key: FRONTEND_URL
        value: https://project-itew.vercel.app
      - key: DB_CONNECTION
        value: mongodb
      - key: MONGODB_URI
        sync: false
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEED
        value: "false"
      - key: MONGO_TLS_ALLOW_INVALID_CERTS
        value: "true"
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: none
      - key: SANCTUM_STATEFUL_DOMAINS
        value: project-itew.vercel.app
      - key: LOG_CHANNEL
        value: stderr
    healthCheckPath: /api/health
